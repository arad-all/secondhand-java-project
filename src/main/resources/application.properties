spring.application.name=secondhand

# --- SQLite ---
spring.datasource.url=jdbc:sqlite:secondhand.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# create/update tables automatically from the entities during development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# --- JWT ---
# Dev-only placeholder secret. Must be at least 32 characters (256 bits) for
# the HS256 signing algorithm JwtService uses. Before any real deployment,
# override this via an environment variable or a git-ignored local
# properties file instead of committing a real secret to source control.
jwt.secret=CHANGE_ME_this_is_a_dev_only_placeholder_secret_key_32b
# Token lifetime in milliseconds. 86400000 = 24 hours.
jwt.expiration-ms=86400000
